name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Desktop builds (Windows / macOS / Linux) ──────────────────────────────────────────────
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact: windows
          - platform: macos-latest
            artifact: macos
          - platform: ubuntu-22.04
            artifact: linux

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # Sync version from git tag (e.g. v1.2.3 -> 1.2.3) so bundle artifacts
      # are named correctly (e.g. ech0_1.2.3_x64-setup.exe).
      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          npm pkg set version="$VERSION"
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const cfg = JSON.parse(fs.readFileSync(p, 'utf8'));
            cfg.version = '$VERSION';
            fs.writeFileSync(p, JSON.stringify(cfg, null, 2) + '\\n');
          "

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  # ── Android APK build ──────────────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android NDK 27.2.12479018
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.2.12479018" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            --sdk_root=$ANDROID_SDK_ROOT

      - name: Add Android Rust targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android \
            i686-linux-android

      - name: Setup NDK toolchain wrappers
        run: |
          NDK_HOME="$ANDROID_SDK_ROOT/ndk/27.2.12479018"
          NDK_BIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          WRAPPER_DIR="/tmp/android-ndk-wrappers"
          mkdir -p "$WRAPPER_DIR"
          for triple in aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android; do
            ln -sf "$NDK_BIN/llvm-ranlib" "$WRAPPER_DIR/${triple}-ranlib"
            ln -sf "$NDK_BIN/llvm-ar"     "$WRAPPER_DIR/${triple}-ar"
            ln -sf "$NDK_BIN/llvm-strip"  "$WRAPPER_DIR/${triple}-strip"
          done
          echo "$WRAPPER_DIR" >> $GITHUB_PATH
          echo "$NDK_BIN"     >> $GITHUB_PATH
          echo "NDK_HOME=$NDK_HOME"               >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT"   >> $GITHUB_ENV

      # Sync version from git tag before building.
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          npm pkg set version="$VERSION"
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const cfg = JSON.parse(fs.readFileSync(p, 'utf8'));
            cfg.version = '$VERSION';
            fs.writeFileSync(p, JSON.stringify(cfg, null, 2) + '\n');
          "

      - name: Install frontend dependencies
        run: npm install

      - name: Initialize Tauri Android project
        run: npm run tauri android init

      - name: Build Android APK
        run: npm run tauri android build

      # Sign the APK so it can be installed without enabling developer options.
      # Requires the ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASS,
      # ANDROID_KEY_ALIAS, and ANDROID_KEY_PASS secrets in the repo settings.
      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
        run: |
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner"
          UNSIGNED_APK=$(find src-tauri/gen/android/app/build/outputs/apk -name '*unsigned*.apk' | head -1)
          if [[ -z "$UNSIGNED_APK" ]]; then
            UNSIGNED_APK=$(find src-tauri/gen/android/app/build/outputs/apk -name '*.apk' | head -1)
          fi
          SIGNED_APK="${UNSIGNED_APK/unsigned/signed}"
          [[ -z "$SIGNED_APK" || "$SIGNED_APK" == "$UNSIGNED_APK" ]] && SIGNED_APK="${UNSIGNED_APK%.apk}-signed.apk"

          if [[ -n "$KEYSTORE_BASE64" ]]; then
            # Release signing via repository secrets
            echo "$KEYSTORE_BASE64" | base64 --decode > /tmp/release.keystore
            "$APKSIGNER" sign \
              --ks /tmp/release.keystore \
              --ks-key-alias "${KEY_ALIAS:-key0}" \
              --ks-pass "pass:${KEYSTORE_PASS}" \
              --key-pass "pass:${KEY_PASS:-$KEYSTORE_PASS}" \
              --out "$SIGNED_APK" \
              "$UNSIGNED_APK"
            rm -f /tmp/release.keystore
          else
            # Fallback: debug-sign for CI testing
            keytool -genkey -v \
              -keystore /tmp/debug.keystore -alias key0 \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=ech0 Debug, O=ech0, C=US" 2>/dev/null
            "$APKSIGNER" sign \
              --ks /tmp/debug.keystore \
              --ks-key-alias key0 \
              --ks-pass pass:android --key-pass pass:android \
              --out "$SIGNED_APK" \
              "$UNSIGNED_APK"
          fi
          echo "SIGNED_APK=$SIGNED_APK" >> "$GITHUB_ENV"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android
          if-no-files-found: error
          path: |
            ${{ env.SIGNED_APK }}
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  # ── Create GitHub Release ────────────────────────────────────────────────────────────────────
  release:
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ech0 ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          files: artifacts/**/*
