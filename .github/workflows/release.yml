name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Desktop builds (Windows / macOS / Linux) ───────────────────────────────
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact: windows
          - platform: macos-latest
            artifact: macos
          - platform: ubuntu-22.04
            artifact: linux

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  # ── Android APK build ──────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android NDK 27.2.12479018
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.2.12479018" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            --sdk_root=$ANDROID_SDK_ROOT

      - name: Add Android Rust targets
        run: |
          rustup target add \
            aarch64-linux-android \
            armv7-linux-androideabi \
            x86_64-linux-android \
            i686-linux-android

      - name: Setup NDK toolchain wrappers
        run: |
          NDK_HOME="$ANDROID_SDK_ROOT/ndk/27.2.12479018"
          NDK_BIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          WRAPPER_DIR="/tmp/android-ndk-wrappers"
          mkdir -p "$WRAPPER_DIR"
          for triple in aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android; do
            ln -sf "$NDK_BIN/llvm-ranlib" "$WRAPPER_DIR/${triple}-ranlib"
            ln -sf "$NDK_BIN/llvm-ar"     "$WRAPPER_DIR/${triple}-ar"
            ln -sf "$NDK_BIN/llvm-strip"  "$WRAPPER_DIR/${triple}-strip"
          done
          echo "$WRAPPER_DIR" >> $GITHUB_PATH
          echo "$NDK_BIN"     >> $GITHUB_PATH
          echo "NDK_HOME=$NDK_HOME"               >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT"   >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: npm install

      - name: Initialize Tauri Android project
        run: npm run tauri android init

      - name: Build Android APK
        run: npm run tauri android build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android
          if-no-files-found: error
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ech0 ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          files: artifacts/**/*
